<svg xmlns="http://www.w3.org/2000/svg" width="860" height="180" viewBox="0 0 860 180">
  <defs>
    <!-- Nền gradient neon tím -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="50%"  stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>

    <!-- Gradient chữ tím neon -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9B59B6"/>
      <stop offset="50%"  stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>

    <!-- Shimmer sweep -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="40%"  stop-color="transparent"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="60%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1 0" to="1 0"
        dur="2.6s"
        repeatCount="indefinite"/>
    </linearGradient>

    <!-- Clip để shimmer chỉ đè lên chữ tên -->
    <clipPath id="nameClip">
      <text x="430" y="90" text-anchor="middle" font-family="'Segoe UI', 'Arial', sans-serif"
            font-size="52" font-weight="800" letter-spacing="3">
        Nguyen Thanh Hieu
      </text>
    </clipPath>

    <!-- Glow filter -->
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow cho subtitle -->
    <filter id="softglow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Nền -->
  <rect width="860" height="180" fill="url(#bg)" rx="12"/>

  <!-- Border viền neon tím mờ -->
  <rect width="858" height="178" x="1" y="1" rx="11" fill="none"
        stroke="#9B59B6" stroke-width="1" opacity="0.5"/>

  <!-- Đường kẻ dưới subtitle, mờ -->
  <line x1="280" y1="148" x2="580" y2="148" stroke="#E040FB" stroke-width="0.6" opacity="0.4"/>

  <!-- Chữ tên - base layer (gradient tím) -->
  <text x="430" y="90"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="52" font-weight="800" letter-spacing="3"
        fill="url(#textGrad)"
        filter="url(#glow)">
    Nguyen Thanh Hieu
  </text>

  <!-- Shimmer layer đè lên chữ tên -->
  <rect x="0" y="0" width="860" height="180"
        fill="url(#shimmer)"
        clip-path="url(#nameClip)"/>

  <!-- Subtitle -->
  <text x="430" y="128"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="16" font-weight="400" letter-spacing="2"
        fill="#CE93D8"
        filter="url(#softglow)">
    Software Engineer  ·  Fullstack Developer
  </text>
</svg>
